version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errname
    - errorlint
    - goconst
    - gocritic
    - gosec
    - misspell
    - nilerr
    - prealloc
    - unconvert
    - unparam
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    goconst:
      min-len: 3
      min-occurrences: 3
    gosec: {}
  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - go.ngs.io/koikoi

run:
  timeout: 5m
